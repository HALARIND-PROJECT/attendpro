/* Year/Month tiles */

.year-tile:hover{border-color:var(--blue);background:var(--blue-l)}

/* Shift badge */

/* Deduction row in attendance */
.ded-row{display:flex;align-items:center;gap:6px;padding:3px 0}

.ct-bar{display:flex;flex-direction:row;gap:4px;flex-wrap:nowrap;overflow-x:auto;align-items:center;padding:4px 0;margin-bottom:6px;scrollbar-width:thin}

.rtbl th.sth{cursor:pointer}.rtbl th.sth:hover{background:var(--blue-l);color:var(--blue)}
.rtbl th .sa{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:9px;opacity:.3}
.rtbl th.s-asc .sa,.rtbl th.s-desc .sa{opacity:1;color:var(--blue)}

<div id="root"></div>
<script>
const {useState,useRef,useEffect,useMemo,useCallback}=React;
const h=React.createElement;

/* ══════════════════════ CONSTANTS ══════════════════════ */
const OT1_THR=225;
const YEARS=[2026,2027,2028,2029,2030];
const MO_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_L=['January','February','March','April','May','June','July','August','September','October','November','December'];
const INIT_CONTRACTORS=[
  {id:'C001',name:'Alpha Workforce',active:true},
  {id:'C002',name:'Beta Staffing',active:true},
  {id:'C003',name:'Delta Labour',active:true},
  {id:'C004',name:'Gamma Resources',active:true},
  {id:'C005',name:'Sigma Group',active:true},
];
const INIT_DEPTS=['Operations','Production','Maintenance','Security','Logistics','Quality Control','Administration','Warehouse','Transport','Housekeeping'];
const SHIFTS={
  DAY:{label:'Day',icon:'☀',color:'#d97706',bg:'#fffbeb',maxH:10},
  NIGHT:{label:'Night',icon:'🌙',color:'#7c3aed',bg:'#f5f3ff',maxH:13.5},
  GEN:{label:'General',icon:'⚡',color:'#0891b2',bg:'#ecfeff',maxH:8.66},
};
const INIT_HCODES=[
  {id:'H866',label:'8.66h',hours:8.66,isOT2:false,color:'#2563eb'},
  {id:'H100',label:'10h',hours:10,isOT2:false,color:'#7c3aed'},
  {id:'H135',label:'13.5h',hours:13.5,isOT2:false,color:'#d97706'},
  {id:'OT2-866',label:'OT2-8.66h',hours:8.66,isOT2:true,color:'#dc2626'},
  {id:'OT2-100',label:'OT2-10h',hours:10,isOT2:true,color:'#db2777'},
  {id:'OT2-135',label:'OT2-13.5h',hours:13.5,isOT2:true,color:'#ea580c'},
];
const OT2_CATS_INIT=[
  {id:'SUNDAY',label:'Sunday',color:'#7c3aed',bg:'#f5f3ff'},
  {id:'PUBLIC_HOL',label:'Public Holiday',color:'#dc2626',bg:'#fef2f2'},
  {id:'SPECIAL',label:'Special Day',color:'#d97706',bg:'#fffbeb'},
  {id:'NIGHT_OT',label:'Night OT',color:'#1d4ed8',bg:'#eff6ff'},
];
const ROLE_DEFS={
  SUPER_ADMIN:{label:'Super Admin',color:'#7c3aed',bg:'#f5f3ff',perms:['all']},
  MANAGER:{label:'Manager',color:'#2563eb',bg:'#eff6ff',perms:['dashboard','attendance','ot_reg','employees','export','audit']},
  DATA_ENTRY:{label:'Data Entry',color:'#059669',bg:'#ecfdf5',perms:['dashboard','attendance','employees']},
  VIEWER:{label:'Viewer',color:'#0891b2',bg:'#ecfeff',perms:['dashboard','ot_reg']},
};
/* ── STANDALONE SYSTEM USERS (not tied to employees) ── */
const INIT_SYS_USERS=[
  {uid:'SU-0001',username:'superadmin',displayName:'Super Admin',pin:'0000',role:'SUPER_ADMIN',active:true,createdAt:'2026-01-01',customPerms:null},
  {uid:'SU-0002',username:'manager',displayName:'Manager User',pin:'1111',role:'MANAGER',active:true,createdAt:'2026-01-01',customPerms:null},
];

const STATUS_CFG={
  present:{color:'#059669',bg:'#ecfdf5',bd:'#6ee7b7',icon:'✓'},
  absent:{color:'#dc2626',bg:'#fef2f2',bd:'#fca5a5',icon:'✗'},
  leave:{color:'#7c3aed',bg:'#f5f3ff',bd:'#ddd6fe',icon:'○'},
  late:{color:'#d97706',bg:'#fffbeb',bd:'#fde68a',icon:'◷'},
};

/* ══════════════════════ HELPERS ══════════════════════ */
function td(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function mk0(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}`}
function fmt2(n){return(+n||0).toFixed(2)}
function ac(s){const c=['#2563eb','#7c3aed','#059669','#0891b2','#d97706','#dc2626','#db2777','#ea580c','#0f766e','#854d0e'];let x=0;for(const ch of (s||'X'))x=(x*31+ch.charCodeAt(0))%c.length;return c[Math.abs(x)%c.length]}
function hasPerm(u,p){if(!u)return false;if(u.role==='SUPER_ADMIN')return true;const rd=ROLE_DEFS[u.role];if(!rd)return false;return(u.customPerms||rd.perms).includes(p)||( u.customPerms||rd.perms).includes('all');}
function empName(e){return(e.name||'').trim()||'Unknown'}
function empInitials(e){return empName(e).split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase()||'??'}
function inRange(mk){const y=+mk.split('-')[0];return y>=2026&&y<=2030;}
function isFuture(mk){const now=new Date();const[y,m]=mk.split('-').map(Number);return y>now.getFullYear()||(y===now.getFullYear()&&m>now.getMonth()+1);}
function daysInMonth(mk){const[y,m]=mk.split('-').map(Number);return new Date(y,m,0).getDate();}
/* Get employee's shift for a specific date — checks shiftHistory */
function getShiftForDate(emp,date){
  if(!emp.shiftHistory||emp.shiftHistory.length===0)return emp.shift||'DAY';
  const sorted=[...emp.shiftHistory].sort((a,b)=>b.from.localeCompare(a.from));
  const found=sorted.find(s=>s.from<=date);
  return found?found.shift:(emp.shift||'DAY');
}

/* ══════════════════════ SEED DATA ══════════════════════ */
const SEED_NAMES=[
  'James Mwangi','Aisha Omondi','Carlos Otieno','Priya Sharma','David Kipchoge',
  'Maria Santos','Felix Hassan','Grace Wanjiku','Henry Rotich','Elena Muthoni',
  'Raj Kumar Patel','Fatima Al-Rashid','Lucas Kimani','Nadia Ouko','Kevin Njoroge',
  'Sophie Wambua','Mohammed Ali Lema','Amara Chebet','Brian Mutua','Chen Wangari',
];

function genEmps(depts){
  return SEED_NAMES.map((name,i)=>({
    id:`EMP-${p2(i+1)}A`,
    name,
    payrollNo:p2(100+i+1),
    department:depts[i%depts.length],
    contractor:INIT_CONTRACTORS[i%INIT_CONTRACTORS.length].name,
    shift:i%3===0?'DAY':i%3===1?'NIGHT':'GEN',
    // shift history for weekly-changing employees
    shiftHistory:i<3?[
      {from:'2026-01-01',shift:i%2===0?'DAY':'NIGHT'},
      {from:'2026-02-01',shift:i%2===0?'NIGHT':'DAY'},
      {from:'2026-03-17',shift:'DAY'},
    ]:[],
    role:i===0?'SUPER_ADMIN':'DATA_ENTRY',
    status:'active',
    pin:String(1000+i),
    inactiveFrom:null,reactivateOn:null,
    joinDate:'2026-01-01',
    travelAllowance:0,
    customPerms:null,
    // custom deduction rules per employee (hour deducted from OT before payout)
    deductionRules:[],
  }));
}

function genAtt(emps,hcodes){
  const rec={};const now=new Date();
  emps.forEach(emp=>{
    rec[emp.id]={};
    if(emp.status!=='active')return;
    for(let y=2026;y<=2030;y++){
      for(let mo=1;mo<=12;mo++){
        if(y>now.getFullYear())break;
        if(y===now.getFullYear()&&mo>now.getMonth()+1)break;
        const dim=new Date(y,mo,0).getDate();
        const lim=y===now.getFullYear()&&mo===now.getMonth()+1?now.getDate()-1:dim;
        for(let d=1;d<=lim;d++){
          const ds=`${y}-${p2(mo)}-${p2(d)}`;
          const r=Math.random();
          const shift=getShiftForDate(emp,ds);
          const shDef=SHIFTS[shift];
          const isOT2=r>0.82;
          const hc=hcodes[isOT2?Math.floor(Math.random()*3)+3:Math.floor(Math.random()*3)];
          const hw=Math.min(hc.hours+(r>0.75?+(Math.random()*1.5).toFixed(2):0),shDef.maxH+2);
          if(r<0.05){rec[emp.id][ds]={status:'absent',hoursWorked:0,hcodeId:null,ot2Cat:null,shift,dedHours:0};}
          else{rec[emp.id][ds]={status:'present',hoursWorked:+hw.toFixed(2),hcodeId:hc.id,ot2Cat:isOT2?OT2_CATS_INIT[Math.floor(Math.random()*OT2_CATS_INIT.length)].id:null,shift,dedHours:0};}
        }
      }
    }
  });
  return rec;
}

/* ══════════════════════ CALC ENGINE ══════════════════════ */
function calcMonth(empId,att,emp,month,hcodes){
  if(!emp)return null;
  const recs=att[empId]||{};
  let totalReg=0,ot2Raw=0,absent=0,present=0,totalDed=0;
  const ot2ByCat={};
  const absDeds=[];
  Object.entries(recs).forEach(([date,r])=>{
    if(!date.startsWith(month))return;
    if(r.status==='absent'){absent++;absDeds.push(8.66);/* Standard: 8.66h per absent day */}
    else{
      present++;
      const hc=hcodes.find(c=>c.id===r.hcodeId);
      const isOT2=hc?hc.isOT2:!!r.ot2Cat;
      const hw=r.hoursWorked||0;
      const ded=r.dedHours||0;
      if(isOT2||r.ot2Cat){ot2Raw+=hw;if(r.ot2Cat)ot2ByCat[r.ot2Cat]=(ot2ByCat[r.ot2Cat]||0)+hw;}
      else totalReg+=hw;
      totalDed+=ded;
    }
  });
  const totalAbsH=absDeds.reduce((s,v)=>s+v,0);
  const ot1Raw=Math.max(0,totalReg-OT1_THR);
  const regRaw=Math.min(totalReg,OT1_THR);
  // Combined: absence+dedHours same OT2->OT1->Reg chain
  let rem=totalAbsH+totalDed,dOT2=0,dOT1=0,dReg=0;
  if(rem>0){dOT2=Math.min(rem,ot2Raw);rem-=dOT2;}
  if(rem>0){dOT1=Math.min(rem,ot1Raw);rem-=dOT1;}
  if(rem>0){dReg=Math.min(rem,regRaw);}
  return{
    regular:+regRaw.toFixed(2),ot1:+ot1Raw.toFixed(2),ot2:+ot2Raw.toFixed(2),
    netReg:+Math.max(0,regRaw-dReg).toFixed(2),
    netOT1:+Math.max(0,ot1Raw-dOT1).toFixed(2),netOT2:+Math.max(0,ot2Raw-dOT2).toFixed(2),
    absent,present,
    totalWorked:+(totalReg+ot2Raw).toFixed(2),
    totalAbsH:+totalAbsH.toFixed(2),
    dOT2:+dOT2.toFixed(2),dOT1:+dOT1.toFixed(2),dReg:+dReg.toFixed(2),
    totalDed:+totalDed.toFixed(2),
    ot2ByCat,
  };
}

/* ══════════════════════ LOGIN ══════════════════════ */
function Login({sysUsers,emps,onLogin}){
  const[id,setId]=useState('');const[pin,setPin]=useState('');const[err,setErr]=useState('');const[show,setShow]=useState(false);
  function go(){
    const u2=id.trim();const p2x=pin.trim();
    // Check system users first
    const su=sysUsers.find(x=>x.username.toLowerCase()===u2.toLowerCase()&&x.pin===p2x);
    if(su){if(!su.active){setErr('Account disabled. Contact admin.');return;}onLogin({...su,id:su.uid,name:su.displayName,isSysUser:true});return;}
    // Then check employees by ID or payrollNo
    const emp=emps.find(x=>(x.id.toLowerCase()===u2.toLowerCase()||( x.payrollNo&&x.payrollNo.toLowerCase()===u2.toLowerCase()))&&x.pin===p2x);
    if(emp){if(emp.status==='inactive'){setErr('Employee account inactive.');return;}onLogin({...emp,isSysUser:false});return;}
    setErr('Invalid username/ID or PIN. Please try again.');
  }
  return h('div',{style:{minHeight:'100vh',background:'linear-gradient(135deg,#eff6ff,#f5f3ff 50%,#ecfdf5)',display:'flex',alignItems:'center',justifyContent:'center'}},
    h('div',{style:{width:380,background:'#fff',border:'1px solid var(--bd)',borderRadius:18,padding:34,boxShadow:'0 16px 50px rgba(26,32,64,.15)'}},
      h('div',{style:{textAlign:'center',marginBottom:22}},
        h('div',{style:{width:54,height:54,background:'linear-gradient(135deg,#2563eb,#7c3aed)',borderRadius:15,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:900,color:'#fff',margin:'0 auto 12px',boxShadow:'0 4px 14px rgba(37,99,235,.32)'}},'A'),
        h('div',{style:{fontSize:20,fontWeight:800,letterSpacing:'-.5px'}},'AttendPro Enterprise'),
        h('div',{style:{fontSize:11,color:'var(--txt3)',marginTop:4}},'v6.6 · Attendance & OT Management')
      ),
      h(Field,{label:'Username or Employee ID / Payroll #'},h('input',{value:id,onChange:e=>setId(e.target.value),onKeyDown:e=>e.key==='Enter'&&go(),className:'inp',placeholder:'e.g. superadmin or EMP-01A'})),
      h(Field,{label:'PIN'},
        h('div',{style:{position:'relative'}},
          h('input',{value:pin,onChange:e=>setPin(e.target.value),onKeyDown:e=>e.key==='Enter'&&go(),type:show?'text':'password',className:'inp',placeholder:'••••'}),
          h('button',{onClick:()=>setShow(p=>!p),style:{position:'absolute',right:9,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--txt3)',fontSize:14,cursor:'pointer'}},show?'◉':'○')
        )
      ),
      err&&h('div',{style:{background:'var(--red-l)',border:'1px solid var(--red-bd)',borderRadius:7,padding:'7px 11px',fontSize:11,color:'var(--red)',marginBottom:11}},'⚠ '+err),
      h('button',{onClick:go,className:'btn btn-primary',style:{width:'100%',padding:12,fontSize:14,borderRadius:9,boxShadow:'0 4px 14px rgba(37,99,235,.3)'}},'Sign In →'),
      h('div',{style:{marginTop:12,background:'var(--bg3)',borderRadius:8,padding:'9px 12px',fontSize:10,color:'var(--txt2)',lineHeight:1.7}},
        h('span',null,'Enter your username or Employee ID and PIN to sign in.')
      )
    )
  );
}

  const stats=useMemo(()=>calcMonth(emp.id,{[emp.id]:localAtt},localEmp,viewMonth,hcodes),[localAtt,viewMonth,hcodes]);

  // Build day-by-day list for the month
  const days=useMemo(()=>{
    const[y,mo]=viewMonth.split('-').map(Number);
    const dim=new Date(y,mo,0).getDate();
    const now=new Date();
    const result=[];
    for(let d=1;d<=dim;d++){
      const ds=`${y}-${p2(mo)}-${p2(d)}`;
      const dow=new Date(ds+'T00:00:00').getDay();
      const past=new Date(ds)<now||ds===td();
      const rec=localAtt[ds]||null;
      const shift=getShiftForDate(localEmp,ds);
      result.push({ds,dow,past,rec,shift});
    }
    return result;

    setLocalAtt(p=>({...p,[ds]:{...(p[ds]||{status:'present',hoursWorked:0,hcodeId:hcodes[0]?.id,ot2Cat:null,shift:getShiftForDate(localEmp,ds),dedHours:0}),...changes}}));
  }
  function addShiftEntry(){
    const h=[...(localEmp.shiftHistory||[]),{...newShiftEntry}].sort((a,b)=>a.from.localeCompare(b.from));

  }

    if(!newDed.label||!newDed.hours)return;
    setLocalEmp(p=>({...p,deductionRules:[...(p.deductionRules||[]),{...newDed,id:Date.now()}]}));

function SortTh({label,sk,sc,sd,onSort,color,dw}){
  const ref=useRef(null);
  const isA=sc===sk;
  const arrow=sk?(isA?(sd==='asc'?'↑':'↓'):'↕'):null;
  function startRz(e){
    e.preventDefault();e.stopPropagation();
    const th=ref.current;if(!th)return;
    const sx=e.clientX;const sw=th.offsetWidth;
    const rz=e.currentTarget;rz.classList.add('rz-on');
    const mm=ev=>{const nw=Math.max(36,sw+(ev.clientX-sx));th.style.width=nw+'px';th.style.minWidth=nw+'px';};
    const mu=()=>{rz.classList.remove('rz-on');document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  }
  return h('th',{ref,className:(sk?'sth':'')+(isA?' s-'+(sd||'asc'):''),
    style:{width:dw,minWidth:dw||36,color:color||undefined},
    onClick:()=>sk&&onSort&&onSort(sk)},
    label,
    arrow&&h('span',{className:'sa'},arrow),
    h('div',{className:'rz',onMouseDown:startRz,onClick:e=>e.stopPropagation()})
  );
}

function ExportView({emps,att,selMonth,setSelMonth,hcodes,ot2Cats,contractors,curUser,showToast}){
  const[fmt,setFmt]=useState('xlsx');
  const[filterBy,setFilterBy]=useState('all');const[filterVal,setFilterVal]=useState('ALL');
  const canExport=hasPerm(curUser,'export');
  const depts=[...new Set(emps.map(e=>e.department))];
  const rows=useMemo(()=>emps.filter(e=>{if(e.status!=='active')return false;if(filterBy==='contractor'&&filterVal!=='ALL')return e.contractor===filterVal;if(filterBy==='department'&&filterVal!=='ALL')return e.department===filterVal;return true;}).map(e=>{const s=calcMonth(e.id,att,e,selMonth,hcodes);return{...e,...(s||{})};}), [emps,att,selMonth,hcodes,filterBy,filterVal]);
    function buildData(){
    const header=['ID / Payroll#','Name','Department','Contractor','Total Work Hrs','Total Loss Hrs','OT-1 Units','OT-2 Units','Present Days','Absent Days','Night Shifts','Travel Allowance',...ot2Cats.map(c=>c.label+' OT2')];
    const dataRows=rows.map(r=>[r.id,empName(r),r.department||'',r.contractor||'',fmt2(r.totalWorked||0),fmt2(r.totalAbsH||0),fmt2(r.netOT1||0),fmt2(r.netOT2||0),(r.present||0),(r.absent||0),fmt2((r.ot2ByCat||{})['NIGHT_OT']||0),r.travelAllowance||0,...ot2Cats.map(c=>fmt2((r.ot2ByCat||{})[c.id]||0))]);
    return[header,...dataRows];
  }
  function doExport(){
    if(!canExport){showToast&&showToast('No export permission','err');return;}
    if(typeof fmt!=='undefined'&&fmt==='csv'){doExportCSV();return;}
    doExportXLS();
  }
  function doExportXLS(){
    if(!canExport){showToast&&showToast('No export permission','err');return;}
    try{
      const data=buildData();
      const wb=XLSX.utils.book_new();
      const ws=XLSX.utils.aoa_to_sheet(data);
      ws['!cols']=[{wch:12},{wch:22},{wch:14},{wch:16},{wch:14},{wch:14},{wch:11},{wch:11},{wch:12},{wch:12},{wch:13},{wch:16},...ot2Cats.map(()=>({wch:14}))];
      XLSX.utils.book_append_sheet(wb,'AttendPro',ws);
      XLSX.writeFile(wb,'AttendPro_'+selMonth+'_'+(filterVal==='ALL'?'All':filterVal)+'.xlsx');
      showToast&&showToast('✓ Excel exported: '+rows.length+' employees');
    }catch(err){console.error(err);showToast&&showToast('Export failed: '+err.message,'err');}
  }
  function doExportCSV(){
    if(!canExport){showToast&&showToast('No export permission','err');return;}
    try{
      const data=buildData();
      const csv=data.map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='AttendPro_'+selMonth+'_'+(filterVal==='ALL'?'All':filterVal)+'.csv';a.click();URL.revokeObjectURL(url);
      showToast&&showToast('✓ CSV exported: '+rows.length+' employees');
    }catch(err){console.error(err);showToast&&showToast('CSV export failed: '+err.message,'err');}
  }  return h('div',{className:'fade'},
    h(PageHeader,{title:'Export — Pay Master Format',right:[h('input',{type:'month',value:selMonth,onChange:e=>{if(inRange(e.target.value)&&!isFuture(e.target.value))setSelMonth(e.target.value);},className:'inp inp-sm',style:{width:150}}),canExport?h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
                h('select',{value:fmt,onChange:e=>setFmt(e.target.value),className:'inp inp-sm',style:{width:80}},h('option',{value:'xls'},'Excel'),h('option',{value:'csv'},'CSV')),
                h('button',{onClick:doExport,className:'btn btn-primary'},'⬇ Export')
              ):h(Chip,{label:'No Export Permission',color:'#dc2626'})]}),
    h('div',{className:'card',style:{marginBottom:12}},

        ['all','contractor','department'].map(v=>h('button',{key:v,onClick:()=>{setFilterBy(v);setFilterVal('ALL');},className:'btn btn-sm '+(filterBy===v?'btn-primary':'btn-ghost')},{all:'All',contractor:'Contractor',department:'Department'}[v])),
        filterBy==='contractor'&&h('select',{value:filterVal,onChange:e=>setFilterVal(e.target.value),className:'inp inp-sm',style:{width:160}},h('option',{value:'ALL'},'All'),...(contractors||INIT_CONTRACTORS).filter(c=>c.active).map(c=>h('option',{key:c.id||c.name,value:c.name||c},c.name||c))),
        filterBy==='department'&&h('select',{value:filterVal,onChange:e=>setFilterVal(e.target.value),className:'inp inp-sm',style:{width:160}},h('option',{value:'ALL'},'All'),...depts.map(d=>h('option',{key:d},d))),
        h('span',{style:{fontSize:11,color:'var(--txt2)',fontWeight:600}},rows.length+' employees')
      )

    h('div',{className:'card-flat',style:{overflowX:'auto'}},
      h('table',null,
        h('thead',null,h('tr',null,['Payroll#','Name','Dept','Worked h','Loss h','OT-1','OT-2','Present','Absent','Night OT','Travel',...ot2Cats.map(c=>c.label)].map(x=>h('th',{key:x},x)))),

    if(newPin1.trim()===oldPin.trim()){setPinErr('New PIN must be different from current PIN.');return;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f4f6fb;--bg2:#fff;--bg3:#eef1f8;--bg4:#f9fafd;
  --bd:#dde3f0;--bd2:#c8d0e8;
  --txt:#1a2040;--txt2:#4a5580;--txt3:#8a96b8;
  --blue:#2563eb;--blue-d:#1d4ed8;--blue-l:#eff6ff;--blue-bd:#bfdbfe;
  --grn:#059669;--grn-l:#ecfdf5;--grn-bd:#6ee7b7;
  --red:#dc2626;--red-l:#fef2f2;--red-bd:#fca5a5;
  --amb:#d97706;--amb-l:#fffbeb;--amb-bd:#fde68a;
  --pur:#7c3aed;--pur-l:#f5f3ff;--pur-bd:#ddd6fe;
  --teal:#0891b2;--teal-l:#ecfeff;
  --pink:#db2777;--pink-l:#fdf2f8;
  --ora:#ea580c;--ora-l:#fff7ed;
  --sh:0 1px 4px rgba(26,32,64,.08);
  --sh2:0 4px 16px rgba(26,32,64,.12);
  --r:9px;--r2:13px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--txt);min-height:100vh}
input,select,textarea{font-family:inherit;outline:none;color:var(--txt)}
input:focus,select:focus,textarea:focus{border-color:var(--blue)!important;box-shadow:0 0 0 3px rgba(37,99,235,.14)!important}
button{font-family:inherit;cursor:pointer;transition:all .14s}
button:active{transform:scale(.97)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* Layout */
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.body-wrap{display:flex;height:calc(100vh - 50px)}
/* Sidebar — collapsible, always on top */
.sidebar{background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:width .2s ease,box-shadow .2s;overflow:hidden;flex-shrink:0;position:sticky;top:0;height:100vh;z-index:150;width:46px}
.sidebar:hover{width:186px;box-shadow:3px 0 14px rgba(26,32,64,.11)}
.sidebar.open{width:186px}
.sidebar.closed{width:46px}
.sidebar-inner{width:186px;padding:10px 7px;display:flex;flex-direction:column;gap:2px;height:100%;overflow-y:auto;overflow-x:hidden}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);border:none;background:transparent;color:var(--txt2);font-size:12px;font-weight:500;text-align:left;width:100%;cursor:pointer;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:var(--blue-l);color:var(--blue)}
.nav-item .nav-lbl{font-size:11px;font-weight:500;opacity:0;width:0;overflow:hidden;white-space:nowrap;transition:opacity .15s,width .15s}
.sidebar:hover .nav-lbl,.sidebar.open .nav-lbl{opacity:1;width:auto}
.nav-item.active{background:var(--blue);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.nav-ico{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.nav-lbl{font-size:12px;overflow:hidden;white-space:nowrap}
.nav-sep{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.7px;font-weight:700;padding:8px 10px 3px;white-space:nowrap;overflow:hidden}
.sidebar-toggle{display:flex;align-items:center;justify-content:center;padding:8px;border:none;background:transparent;color:var(--txt3);font-size:18px;cursor:pointer;border-radius:var(--r);width:100%}
.sidebar-toggle:hover{background:var(--bg3)}
.main{flex:1;overflow-y:auto;padding:18px;min-width:0}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;box-shadow:var(--sh)}
.card-flat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:transform .18s,box-shadow .18s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh2)}

/* Tables — COMPACT */
table{width:100%;border-collapse:collapse}
th{padding:6px 9px;text-align:left;font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);background:var(--bg4);white-space:nowrap}
td{padding:5px 9px;font-size:11px;border-bottom:1px solid var(--bg3);color:var(--txt);vertical-align:middle}
tr:hover td{background:#f5f7ff}

/* Chips */
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid transparent;white-space:nowrap}

/* Forms */
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.inp{width:100%;background:var(--bg2);border:1.5px solid var(--bd);border-radius:7px;padding:7px 10px;font-size:12px;color:var(--txt)}
.inp-sm{padding:4px 8px;font-size:11px;border-radius:6px}
.row{display:flex;gap:9px}
.row .field{flex:1}

/* Buttons */
.btn{border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.28)}
.btn-primary:hover{background:var(--blue-d)}
.btn-success{background:var(--grn);color:#fff}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid var(--red-bd)!important}
.btn-ghost{background:var(--bg3);color:var(--txt2);border:1px solid var(--bd)}
.btn-ghost:hover{background:var(--bd)}
.btn-amber{background:var(--amb-l);color:var(--amb);border:1px solid var(--amb-bd)!important}

/* Tabs */
.tab-bar{display:flex;gap:3px;background:var(--bg3);border-radius:9px;padding:3px;width:fit-content;margin-bottom:14px}
.tab{padding:5px 13px;border-radius:7px;border:none;background:transparent;color:var(--txt2);font-size:11px;font-weight:500;cursor:pointer}
.tab.active{background:var(--bg2);color:var(--blue);font-weight:700;box-shadow:var(--sh)}

/* Modal */
.ovl{position:fixed;inset:0;background:rgba(26,32,64,.48);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:24px;max-height:94vh;overflow-y:auto;box-shadow:0 20px 60px rgba(26,32,64,.22);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(-6px)}to{opacity:1;transform:none}}

/* Employee Detail Modal — full scroll */
.emp-detail-modal{width:900px;max-width:96vw}

/* Attendance rows — compact grid */
.att-row{display:grid;align-items:center;gap:5px;padding:4px 8px;border-radius:7px;border:1.5px solid var(--bd);background:#fff;margin-bottom:3px;transition:border-color .12s}
.att-row:hover{border-color:var(--blue-bd);background:var(--blue-l)}

/* Misc */
.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sec-ttl{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:11px;letter-spacing:-.2px}
.info-box{border-radius:8px;padding:9px 12px;font-size:11px;margin-bottom:12px}
.info-blue{background:var(--blue-l);border:1px solid var(--blue-bd);color:var(--blue)}
.info-green{background:var(--grn-l);border:1px solid var(--grn-bd);color:var(--grn)}
.info-purple{background:var(--pur-l);border:1px solid var(--pur-bd);color:var(--pur)}
.info-amber{background:var(--amb-l);border:1px solid var(--amb-bd);color:var(--amb)}
.cb{width:15px;height:15px;border-radius:4px;border:2px solid var(--bd2);background:var(--bg2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
.cb.on{background:var(--blue);border-color:var(--blue)}
.toast{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:9px;font-size:12px;font-weight:700;color:#fff;z-index:9999;box-shadow:0 6px 24px rgba(0,0,0,.2);animation:fadeIn .18s ease;max-width:320px}
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-hdr h2{font-size:19px;font-weight:800;letter-spacing:-.4px}
.page-hdr .sub{color:var(--txt2);font-size:11px;margin-top:3px}
.right-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

/* Year/Month tiles */
.year-tile{border:2px solid var(--bd);border-radius:11px;padding:11px 14px;cursor:pointer;background:var(--bg2);transition:all .18s;text-align:center}
.year-tile:hover{border-color:var(--blue);background:var(--blue-l)}
.year-tile.active{border-color:var(--blue);background:var(--blue);color:#fff;box-shadow:0 3px 12px rgba(37,99,235,.3)}
.month-btn{padding:6px 10px;border-radius:7px;border:1.5px solid var(--bd);background:var(--bg2);font-size:11px;font-weight:600;cursor:pointer;transition:all .13s;color:var(--txt2)}
.month-btn:hover{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.month-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.month-btn.fut{opacity:.35;cursor:not-allowed}

/* Shift badge */
.shift-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}

/* Shift history rows */
.shift-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;border:1.5px solid var(--bd);background:#fff;margin-bottom:4px}

/* Deduction row in attendance */
.ded-row{display:flex;align-items:center;gap:6px;padding:3px 0}

.ct-bar{display:flex;flex-direction:row;gap:4px;flex-wrap:nowrap;overflow-x:auto;align-items:center;padding:4px 0;margin-bottom:6px;scrollbar-width:thin}
.ct-bar::-webkit-scrollbar{height:3px}
.ct-lbl{font-size:9px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;margin-right:3px;white-space:nowrap}
.ct-btn{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;line-height:1.5;border:1.5px solid;transition:all .12s}
.rtbl{table-layout:fixed;width:100%;border-collapse:collapse}
.rtbl th{position:relative;overflow:hidden;white-space:nowrap;user-select:none;padding:6px 20px 6px 8px;font-size:9px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);background:var(--bg4)}
.rtbl th.sth{cursor:pointer}.rtbl th.sth:hover{background:var(--blue-l);color:var(--blue)}
.rtbl th .sa{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:9px;opacity:.3}
.rtbl th.s-asc .sa,.rtbl th.s-desc .sa{opacity:1;color:var(--blue)}
.rtbl th .rz{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;border-right:2px solid transparent;transition:border-color .12s}
.rtbl th:hover .rz,.rtbl th .rz.rz-on{border-right-color:var(--blue)}
.rtbl td{padding:4px 7px;font-size:11px;border-bottom:1px solid var(--bg3);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useRef,useEffect,useMemo,useCallback}=React;
const h=React.createElement;

/* ══════════════════════ CONSTANTS ══════════════════════ */
const OT1_THR=225;
const YEARS=[2026,2027,2028,2029,2030];
const MO_S=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_L=['January','February','March','April','May','June','July','August','September','October','November','December'];
const INIT_CONTRACTORS=[
  {id:'C001',name:'Alpha Workforce',active:true},
  {id:'C002',name:'Beta Staffing',active:true},
  {id:'C003',name:'Delta Labour',active:true},
  {id:'C004',name:'Gamma Resources',active:true},
  {id:'C005',name:'Sigma Group',active:true},
];
const INIT_DEPTS=['Operations','Production','Maintenance','Security','Logistics','Quality Control','Administration','Warehouse','Transport','Housekeeping'];
const SHIFTS={
  DAY:{label:'Day',icon:'☀',color:'#d97706',bg:'#fffbeb',maxH:10},
  NIGHT:{label:'Night',icon:'🌙',color:'#7c3aed',bg:'#f5f3ff',maxH:13.5},
  GEN:{label:'General',icon:'⚡',color:'#0891b2',bg:'#ecfeff',maxH:8.66},
};
const INIT_HCODES=[
  {id:'H866',label:'8.66h',hours:8.66,isOT2:false,color:'#2563eb'},
  {id:'H100',label:'10h',hours:10,isOT2:false,color:'#7c3aed'},
  {id:'H135',label:'13.5h',hours:13.5,isOT2:false,color:'#d97706'},
  {id:'OT2-866',label:'OT2-8.66h',hours:8.66,isOT2:true,color:'#dc2626'},
  {id:'OT2-100',label:'OT2-10h',hours:10,isOT2:true,color:'#db2777'},
  {id:'OT2-135',label:'OT2-13.5h',hours:13.5,isOT2:true,color:'#ea580c'},
];
const OT2_CATS_INIT=[
  {id:'SUNDAY',label:'Sunday',color:'#7c3aed',bg:'#f5f3ff'},
  {id:'PUBLIC_HOL',label:'Public Holiday',color:'#dc2626',bg:'#fef2f2'},
  {id:'SPECIAL',label:'Special Day',color:'#d97706',bg:'#fffbeb'},
  {id:'NIGHT_OT',label:'Night OT',color:'#1d4ed8',bg:'#eff6ff'},
];
const ROLE_DEFS={
  SUPER_ADMIN:{label:'Super Admin',color:'#7c3aed',bg:'#f5f3ff',perms:['all']},
  MANAGER:{label:'Manager',color:'#2563eb',bg:'#eff6ff',perms:['dashboard','attendance','ot_reg','employees','export','audit']},
  DATA_ENTRY:{label:'Data Entry',color:'#059669',bg:'#ecfdf5',perms:['dashboard','attendance','employees']},
  VIEWER:{label:'Viewer',color:'#0891b2',bg:'#ecfeff',perms:['dashboard','ot_reg']},
};
/* ── STANDALONE SYSTEM USERS (not tied to employees) ── */
const INIT_SYS_USERS=[
  {uid:'SU-0001',username:'superadmin',displayName:'Super Admin',pin:'0000',role:'SUPER_ADMIN',active:true,createdAt:'2026-01-01',customPerms:null},
  {uid:'SU-0002',username:'manager',displayName:'Manager User',pin:'1111',role:'MANAGER',active:true,createdAt:'2026-01-01',customPerms:null},
];

const STATUS_CFG={
  present:{color:'#059669',bg:'#ecfdf5',bd:'#6ee7b7',icon:'✓'},
  absent:{color:'#dc2626',bg:'#fef2f2',bd:'#fca5a5',icon:'✗'},
  leave:{color:'#7c3aed',bg:'#f5f3ff',bd:'#ddd6fe',icon:'○'},
  late:{color:'#d97706',bg:'#fffbeb',bd:'#fde68a',icon:'◷'},
};

/* ══════════════════════ HELPERS ══════════════════════ */
function td(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function mk0(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}`}
function fmt2(n){return(+n||0).toFixed(2)}
function ac(s){const c=['#2563eb','#7c3aed','#059669','#0891b2','#d97706','#dc2626','#db2777','#ea580c','#0f766e','#854d0e'];let x=0;for(const ch of (s||'X'))x=(x*31+ch.charCodeAt(0))%c.length;return c[Math.abs(x)%c.length]}
function hasPerm(u,p){if(!u)return false;if(u.role==='SUPER_ADMIN')return true;const rd=ROLE_DEFS[u.role];if(!rd)return false;return(u.customPerms||rd.perms).includes(p)||( u.customPerms||rd.perms).includes('all');}
function empName(e){return(e.name||'').trim()||'Unknown'}
function empInitials(e){return empName(e).split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase()||'??'}
function inRange(mk){const y=+mk.split('-')[0];return y>=2026&&y<=2030;}
function isFuture(mk){const now=new Date();const[y,m]=mk.split('-').map(Number);return y>now.getFullYear()||(y===now.getFullYear()&&m>now.getMonth()+1);}
function daysInMonth(mk){const[y,m]=mk.split('-').map(Number);return new Date(y,m,0).getDate();}
/* Get employee's shift for a specific date — checks shiftHistory */
function getShiftForDate(emp,date){
  if(!emp.shiftHistory||emp.shiftHistory.length===0)return emp.shift||'DAY';
  const sorted=[...emp.shiftHistory].sort((a,b)=>b.from.localeCompare(a.from));
  const found=sorted.find(s=>s.from<=date);
  return found?found.shift:(emp.shift||'DAY');
}

/* ══════════════════════ SEED DATA ══════════════════════ */
const SEED_NAMES=[
  'James Mwangi','Aisha Omondi','Carlos Otieno','Priya Sharma','David Kipchoge',
  'Maria Santos','Felix Hassan','Grace Wanjiku','Henry Rotich','Elena Muthoni',
  'Raj Kumar Patel','Fatima Al-Rashid','Lucas Kimani','Nadia Ouko','Kevin Njoroge',
  'Sophie Wambua','Mohammed Ali Lema','Amara Chebet','Brian Mutua','Chen Wangari',
];

function genEmps(depts){
  return SEED_NAMES.map((name,i)=>({
    id:`EMP-${p2(i+1)}A`,
    name,
    payrollNo:p2(100+i+1),
    department:depts[i%depts.length],
    contractor:INIT_CONTRACTORS[i%INIT_CONTRACTORS.length].name,
    shift:i%3===0?'DAY':i%3===1?'NIGHT':'GEN',
    // shift history for weekly-changing employees
    shiftHistory:i<3?[
      {from:'2026-01-01',shift:i%2===0?'DAY':'NIGHT'},
      {from:'2026-02-01',shift:i%2===0?'NIGHT':'DAY'},
      {from:'2026-03-17',shift:'DAY'},
    ]:[],
    role:i===0?'SUPER_ADMIN':'DATA_ENTRY',
    status:'active',
    pin:String(1000+i),
    inactiveFrom:null,reactivateOn:null,
    joinDate:'2026-01-01',
    travelAllowance:0,
    customPerms:null,
    // custom deduction rules per employee (hour deducted from OT before payout)
    deductionRules:[],
  }));
}

function genAtt(emps,hcodes){
  const rec={};const now=new Date();
  emps.forEach(emp=>{
    rec[emp.id]={};
    if(emp.status!=='active')return;
    for(let y=2026;y<=2030;y++){
      for(let mo=1;mo<=12;mo++){
        if(y>now.getFullYear())break;
        if(y===now.getFullYear()&&mo>now.getMonth()+1)break;
        const dim=new Date(y,mo,0).getDate();
        const lim=y===now.getFullYear()&&mo===now.getMonth()+1?now.getDate()-1:dim;
        for(let d=1;d<=lim;d++){
          const ds=`${y}-${p2(mo)}-${p2(d)}`;
          const r=Math.random();
          const shift=getShiftForDate(emp,ds);
          const shDef=SHIFTS[shift];
          const isOT2=r>0.82;
          const hc=hcodes[isOT2?Math.floor(Math.random()*3)+3:Math.floor(Math.random()*3)];
          const hw=Math.min(hc.hours+(r>0.75?+(Math.random()*1.5).toFixed(2):0),shDef.maxH+2);
          if(r<0.05){rec[emp.id][ds]={status:'absent',hoursWorked:0,hcodeId:null,ot2Cat:null,shift,dedHours:0};}
          else{rec[emp.id][ds]={status:'present',hoursWorked:+hw.toFixed(2),hcodeId:hc.id,ot2Cat:isOT2?OT2_CATS_INIT[Math.floor(Math.random()*OT2_CATS_INIT.length)].id:null,shift,dedHours:0};}
        }
      }
    }
  });
  return rec;
}

/* ══════════════════════ CALC ENGINE ══════════════════════ */
function calcMonth(empId,att,emp,month,hcodes){
  if(!emp)return null;
  const recs=att[empId]||{};
  let totalReg=0,ot2Raw=0,absent=0,present=0,totalDed=0;
  const ot2ByCat={};
  const absDeds=[];
  Object.entries(recs).forEach(([date,r])=>{
    if(!date.startsWith(month))return;
    if(r.status==='absent'){absent++;absDeds.push(8.66);/* Standard: 8.66h per absent day */}
    else{
      present++;
      const hc=hcodes.find(c=>c.id===r.hcodeId);
      const isOT2=hc?hc.isOT2:!!r.ot2Cat;
      const hw=r.hoursWorked||0;
      const ded=r.dedHours||0;
      if(isOT2||r.ot2Cat){ot2Raw+=hw;if(r.ot2Cat)ot2ByCat[r.ot2Cat]=(ot2ByCat[r.ot2Cat]||0)+hw;}
      else totalReg+=hw;
      totalDed+=ded;
    }
  });
  const totalAbsH=absDeds.reduce((s,v)=>s+v,0);
  const ot1Raw=Math.max(0,totalReg-OT1_THR);
  const regRaw=Math.min(totalReg,OT1_THR);
  // Combined: absence+dedHours same OT2->OT1->Reg chain
  let rem=totalAbsH+totalDed,dOT2=0,dOT1=0,dReg=0;
  if(rem>0){dOT2=Math.min(rem,ot2Raw);rem-=dOT2;}
  if(rem>0){dOT1=Math.min(rem,ot1Raw);rem-=dOT1;}
  if(rem>0){dReg=Math.min(rem,regRaw);}
  return{
    regular:+regRaw.toFixed(2),ot1:+ot1Raw.toFixed(2),ot2:+ot2Raw.toFixed(2),
    netReg:+Math.max(0,regRaw-dReg).toFixed(2),
    netOT1:+Math.max(0,ot1Raw-dOT1).toFixed(2),netOT2:+Math.max(0,ot2Raw-dOT2).toFixed(2),
    absent,present,
    totalWorked:+(totalReg+ot2Raw).toFixed(2),
    totalAbsH:+totalAbsH.toFixed(2),
    dOT2:+dOT2.toFixed(2),dOT1:+dOT1.toFixed(2),dReg:+dReg.toFixed(2),
    totalDed:+totalDed.toFixed(2),
    ot2ByCat,
  };
}

/* ══════════════════════ LOGIN ══════════════════════ */
function Login({sysUsers,emps,onLogin}){
  const[id,setId]=useState('');const[pin,setPin]=useState('');const[err,setErr]=useState('');const[show,setShow]=useState(false);
  function go(){
    const u2=id.trim();const p2x=pin.trim();
    // Check system users first
    const su=sysUsers.find(x=>x.username.toLowerCase()===u2.toLowerCase()&&x.pin===p2x);
    if(su){if(!su.active){setErr('Account disabled. Contact admin.');return;}onLogin({...su,id:su.uid,name:su.displayName,isSysUser:true});return;}
    // Then check employees by ID or payrollNo
    const emp=emps.find(x=>(x.id.toLowerCase()===u2.toLowerCase()||( x.payrollNo&&x.payrollNo.toLowerCase()===u2.toLowerCase()))&&x.pin===p2x);
    if(emp){if(emp.status==='inactive'){setErr('Employee account inactive.');return;}onLogin({...emp,isSysUser:false});return;}
    setErr('Invalid username/ID or PIN. Please try again.');
  }
  return h('div',{style:{minHeight:'100vh',background:'linear-gradient(135deg,#eff6ff,#f5f3ff 50%,#ecfdf5)',display:'flex',alignItems:'center',justifyContent:'center'}},
    h('div',{style:{width:380,background:'#fff',border:'1px solid var(--bd)',borderRadius:18,padding:34,boxShadow:'0 16px 50px rgba(26,32,64,.15)'}},
      h('div',{style:{textAlign:'center',marginBottom:22}},
        h('div',{style:{width:54,height:54,background:'linear-gradient(135deg,#2563eb,#7c3aed)',borderRadius:15,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:900,color:'#fff',margin:'0 auto 12px',boxShadow:'0 4px 14px rgba(37,99,235,.32)'}},'A'),
        h('div',{style:{fontSize:20,fontWeight:800,letterSpacing:'-.5px'}},'AttendPro Enterprise'),
        h('div',{style:{fontSize:11,color:'var(--txt3)',marginTop:4}},'v6.6 · Attendance & OT Management')
      ),
      h(Field,{label:'Username or Employee ID / Payroll #'},h('input',{value:id,onChange:e=>setId(e.target.value),onKeyDown:e=>e.key==='Enter'&&go(),className:'inp',placeholder:'e.g. superadmin or EMP-01A'})),
      h(Field,{label:'PIN'},
        h('div',{style:{position:'relative'}},
          h('input',{value:pin,onChange:e=>setPin(e.target.value),onKeyDown:e=>e.key==='Enter'&&go(),type:show?'text':'password',className:'inp',placeholder:'••••'}),
          h('button',{onClick:()=>setShow(p=>!p),style:{position:'absolute',right:9,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--txt3)',fontSize:14,cursor:'pointer'}},show?'◉':'○')
        )
      ),
      err&&h('div',{style:{background:'var(--red-l)',border:'1px solid var(--red-bd)',borderRadius:7,padding:'7px 11px',fontSize:11,color:'var(--red)',marginBottom:11}},'⚠ '+err),
      h('button',{onClick:go,className:'btn btn-primary',style:{width:'100%',padding:12,fontSize:14,borderRadius:9,boxShadow:'0 4px 14px rgba(37,99,235,.3)'}},'Sign In →'),
      h('div',{style:{marginTop:12,background:'var(--bg3)',borderRadius:8,padding:'9px 12px',fontSize:10,color:'var(--txt2)',lineHeight:1.7}},
        h('span',null,'Enter your username or Employee ID and PIN to sign in.')
      )
    )
  );
}

  const stats=useMemo(()=>calcMonth(emp.id,{[emp.id]:localAtt},localEmp,viewMonth,hcodes),[localAtt,viewMonth,hcodes]);

  // Build day-by-day list for the month
  const days=useMemo(()=>{
    const[y,mo]=viewMonth.split('-').map(Number);
    const dim=new Date(y,mo,0).getDate();
    const now=new Date();
    const result=[];
    for(let d=1;d<=dim;d++){
      const ds=`${y}-${p2(mo)}-${p2(d)}`;
      const dow=new Date(ds+'T00:00:00').getDay();
      const past=new Date(ds)<now||ds===td();
      const rec=localAtt[ds]||null;
      const shift=getShiftForDate(localEmp,ds);
      result.push({ds,dow,past,rec,shift});
    }
    return result;
  },[viewMonth,localAtt,localEmp]);

  function saveDay(ds,changes){
    setLocalAtt(p=>({...p,[ds]:{...(p[ds]||{status:'present',hoursWorked:0,hcodeId:hcodes[0]?.id,ot2Cat:null,shift:getShiftForDate(localEmp,ds),dedHours:0}),...changes}}));
  }
  function addShiftEntry(){
    const h=[...(localEmp.shiftHistory||[]),{...newShiftEntry}].sort((a,b)=>a.from.localeCompare(b.from));
    setLocalEmp(p=>({...p,shiftHistory:h}));
  }
  function removeShift(idx){setLocalEmp(p=>({...p,shiftHistory:(p.shiftHistory||[]).filter((_,i)=>i!==idx)}));}
  function addDeduction(){
    if(!newDed.label||!newDed.hours)return;
    setLocalEmp(p=>({...p,deductionRules:[...(p.deductionRules||[]),{...newDed,id:Date.now()}]}));
    setNewDed({label:'',hours:0,applyFrom:viewMonth,applyTo:viewMonth});

function SortTh({label,sk,sc,sd,onSort,color,dw}){
  const ref=useRef(null);
  const isA=sc===sk;
  const arrow=sk?(isA?(sd==='asc'?'↑':'↓'):'↕'):null;
  function startRz(e){
    e.preventDefault();e.stopPropagation();
    const th=ref.current;if(!th)return;
    const sx=e.clientX;const sw=th.offsetWidth;
    const rz=e.currentTarget;rz.classList.add('rz-on');
    const mm=ev=>{const nw=Math.max(36,sw+(ev.clientX-sx));th.style.width=nw+'px';th.style.minWidth=nw+'px';};
    const mu=()=>{rz.classList.remove('rz-on');document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  }
  return h('th',{ref,className:(sk?'sth':'')+(isA?' s-'+(sd||'asc'):''),
    style:{width:dw,minWidth:dw||36,color:color||undefined},
    onClick:()=>sk&&onSort&&onSort(sk)},
    label,
    arrow&&h('span',{className:'sa'},arrow),
    h('div',{className:'rz',onMouseDown:startRz,onClick:e=>e.stopPropagation()})
  );
}

/* ══════════════════════ EXPORT ══════════════════════ */
function ExportView({emps,att,selMonth,setSelMonth,hcodes,ot2Cats,contractors,curUser,showToast}){
  const[fmt,setFmt]=useState('xlsx');
  const[filterBy,setFilterBy]=useState('all');const[filterVal,setFilterVal]=useState('ALL');
  const canExport=hasPerm(curUser,'export');
  const depts=[...new Set(emps.map(e=>e.department))];
  const rows=useMemo(()=>emps.filter(e=>{if(e.status!=='active')return false;if(filterBy==='contractor'&&filterVal!=='ALL')return e.contractor===filterVal;if(filterBy==='department'&&filterVal!=='ALL')return e.department===filterVal;return true;}).map(e=>{const s=calcMonth(e.id,att,e,selMonth,hcodes);return{...e,...(s||{})};}), [emps,att,selMonth,hcodes,filterBy,filterVal]);
    function buildData(){
    const header=['ID / Payroll#','Name','Department','Contractor','Total Work Hrs','Total Loss Hrs','OT-1 Units','OT-2 Units','Present Days','Absent Days','Night Shifts','Travel Allowance',...ot2Cats.map(c=>c.label+' OT2')];
    const dataRows=rows.map(r=>[r.id,empName(r),r.department||'',r.contractor||'',fmt2(r.totalWorked||0),fmt2(r.totalAbsH||0),fmt2(r.netOT1||0),fmt2(r.netOT2||0),(r.present||0),(r.absent||0),fmt2((r.ot2ByCat||{})['NIGHT_OT']||0),r.travelAllowance||0,...ot2Cats.map(c=>fmt2((r.ot2ByCat||{})[c.id]||0))]);
    return[header,...dataRows];
  }
  function doExport(){
    if(!canExport){showToast&&showToast('No export permission','err');return;}
    if(typeof fmt!=='undefined'&&fmt==='csv'){doExportCSV();return;}
    doExportXLS();
  }
  function doExportXLS(){
    if(!canExport){showToast&&showToast('No export permission','err');return;}
    try{
      const data=buildData();
      const wb=XLSX.utils.book_new();
      const ws=XLSX.utils.aoa_to_sheet(data);
      ws['!cols']=[{wch:12},{wch:22},{wch:14},{wch:16},{wch:14},{wch:14},{wch:11},{wch:11},{wch:12},{wch:12},{wch:13},{wch:16},...ot2Cats.map(()=>({wch:14}))];
      XLSX.utils.book_append_sheet(wb,'AttendPro',ws);
      XLSX.writeFile(wb,'AttendPro_'+selMonth+'_'+(filterVal==='ALL'?'All':filterVal)+'.xlsx');
      showToast&&showToast('✓ Excel exported: '+rows.length+' employees');
    }catch(err){console.error(err);showToast&&showToast('Export failed: '+err.message,'err');}
  }
  function doExportCSV(){
    if(!canExport){showToast&&showToast('No export permission','err');return;}
    try{
      const data=buildData();
      const csv=data.map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='AttendPro_'+selMonth+'_'+(filterVal==='ALL'?'All':filterVal)+'.csv';a.click();URL.revokeObjectURL(url);
      showToast&&showToast('✓ CSV exported: '+rows.length+' employees');
    }catch(err){console.error(err);showToast&&showToast('CSV export failed: '+err.message,'err');}
  }  return h('div',{className:'fade'},
    h(PageHeader,{title:'Export — Pay Master Format',right:[h('input',{type:'month',value:selMonth,onChange:e=>{if(inRange(e.target.value)&&!isFuture(e.target.value))setSelMonth(e.target.value);},className:'inp inp-sm',style:{width:150}}),canExport?h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
                h('select',{value:fmt,onChange:e=>setFmt(e.target.value),className:'inp inp-sm',style:{width:80}},h('option',{value:'xls'},'Excel'),h('option',{value:'csv'},'CSV')),
                h('button',{onClick:doExport,className:'btn btn-primary'},'⬇ Export')
              ):h(Chip,{label:'No Export Permission',color:'#dc2626'})]}),
    h('div',{className:'card',style:{marginBottom:12}},
      h(SectionTitle,'Filter'),
      h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}},
        ['all','contractor','department'].map(v=>h('button',{key:v,onClick:()=>{setFilterBy(v);setFilterVal('ALL');},className:'btn btn-sm '+(filterBy===v?'btn-primary':'btn-ghost')},{all:'All',contractor:'Contractor',department:'Department'}[v])),
        filterBy==='contractor'&&h('select',{value:filterVal,onChange:e=>setFilterVal(e.target.value),className:'inp inp-sm',style:{width:160}},h('option',{value:'ALL'},'All'),...(contractors||INIT_CONTRACTORS).filter(c=>c.active).map(c=>h('option',{key:c.id||c.name,value:c.name||c},c.name||c))),
        filterBy==='department'&&h('select',{value:filterVal,onChange:e=>setFilterVal(e.target.value),className:'inp inp-sm',style:{width:160}},h('option',{value:'ALL'},'All'),...depts.map(d=>h('option',{key:d},d))),
        h('span',{style:{fontSize:11,color:'var(--txt2)',fontWeight:600}},rows.length+' employees')
      )
    ),
    h('div',{className:'card-flat',style:{overflowX:'auto'}},
      h('table',null,
        h('thead',null,h('tr',null,['Payroll#','Name','Dept','Worked h','Loss h','OT-1','OT-2','Present','Absent','Night OT','Travel',...ot2Cats.map(c=>c.label)].map(x=>h('th',{key:x},x)))),
        h('tbody',null,rows.slice(0,30).map((r,i)=>h('tr',{key:r.id,style:{background:i%2===0?'#fff':'#fafbff'}},
          h('td',null,h('b',{style:{color:'#2563eb',fontSize:11}},r.payrollNo||r.id)),
          h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:6}},h(Av,{name:empName(r),size:22}),h('span',{style:{fontSize:11,fontWeight:700}},empName(r)))),
          h('td',{style:{fontSize:10,color:'var(--txt2)'}},r.department),
          h('td',{style:{color:'#059669',fontWeight:700}},fmt2(r.totalWorked||0)),h('td',{style:{color:'#dc2626'}},fmt2(r.totalAbsH||0)),h('td',{style:{color:'#d97706',fontWeight:(r.netOT1||0)>.01?700:400}},fmt2(r.netOT1||0)),h('td',{style:{color:'#7c3aed',fontWeight:(r.netOT2||0)>.01?700:400}},fmt2(r.netOT2||0)),h('td',null,(r.present||0)+'d'),h('td',null,(r.absent||0)+'d'),h('td',null,fmt2((r.ot2ByCat||{})['NIGHT_OT']||0)),h('td',null,r.travelAllowance||0),
          ...ot2Cats.map(c=>h('td',{key:c.id,style:{color:(r.ot2ByCat||{})[c.id]>.01?c.color:'var(--txt3)'}},( r.ot2ByCat||{})[c.id]>.01?fmt2((r.ot2ByCat||{})[c.id]):'—'))
        )))
      )
    )
  );
}

function UserManagement({sysUsers,setSysUsers,curUser,showToast}){
  const isSA=curUser.role==='SUPER_ADMIN';
  const[addOpen,setAddOpen]=useState(false);
  const[editU,setEditU]=useState(null);
  const[showPins,setShowPins]=useState({});
  const blankU={username:'',displayName:'',pin:'',role:'VIEWER',active:true};
  const[oldPin,setOldPin]=useState('');const[newPin1,setNewPin1]=useState('');const[newPin2,setNewPin2]=useState('');
  const[showSelfPin,setShowSelfPin]=useState(false);const[pinErr,setPinErr]=useState('');
  function changeSelfPin(){
    setPinErr('');
    const myUid=curUser.uid||curUser.id;
    const me=sysUsers.find(u=>u.uid===myUid);
    if(!me){setPinErr('User record not found.');return;}
    if(me.pin!==oldPin.trim()){setPinErr('Current PIN is incorrect.');return;}
    if(newPin1.trim().length<4){setPinErr('New PIN must be at least 4 digits.');return;}
    if(!/^[0-9]+$/.test(newPin1.trim())){setPinErr('PIN must contain digits only.');return;}
    if(newPin1.trim()!==newPin2.trim()){setPinErr('New PINs do not match.');return;}
    if(newPin1.trim()===oldPin.trim()){setPinErr('New PIN must be different from current PIN.');return;}
    setSysUsers(p=>p.map(u=>u.uid===myUid?{...u,pin:newPin1.trim()}:u));
    showToast('PIN changed successfully');setOldPin('');setNewPin1('');setNewPin2('');setShowSelfPin(false);
  }
  const[newU,setNewU]=useState({...blankU});
  const[custPerms,setCustPerms]=useState([]);

  function addUser(){
    if(!newU.username.trim()||newU.pin.length<4){showToast('Username and PIN (min 4 digits) required','err');return;}
    if(sysUsers.find(u=>u.username.toLowerCase()===newU.username.trim().toLowerCase())){showToast('Username already exists','err');return;}
    const uid='SU-'+Date.now().toString().slice(-5);
    setSysUsers(p=>[...p,{...newU,uid,username:newU.username.trim(),displayName:newU.displayName.trim()||newU.username.trim(),createdAt:td(),customPerms:newU.role==='CUSTOM'?custPerms:null}]);
    showToast('User "'+newU.username+'" created');setAddOpen(false);setNewU({...blankU});setCustPerms([]);
  }
  function saveEdit(uid,ch){
    if(ch.username&&sysUsers.find(u=>u.uid!==uid&&u.username.toLowerCase()===ch.username.toLowerCase())){showToast('Username taken','err');return;}
    setSysUsers(p=>p.map(u=>u.uid===uid?{...u,...ch}:u));showToast('User updated');setEditU(null);
  }
  function deleteUser(uid,un){
    if(uid===curUser.uid||uid===curUser.id){showToast('Cannot delete your own account','err');return;}
    if(!window.confirm('Delete user "'+un+'"? This cannot be undone.'))return;
    setSysUsers(p=>p.filter(u=>u.uid!==uid));showToast('"'+un+'" deleted');

    setSysUsers(p=>p.map(u=>u.uid===uid?{...u,pin:np}:u));

    showToast('PIN reset: @'+un);
  }

      ),

        h(Row2,null,
          h(Field,{label:'Current PIN'},h('input',{type:'password',value:oldPin,onChange:e=>setOldPin(e.target.value),className:'inp',placeholder:'Enter current PIN',maxLength:8})),
          h(Field,{label:'New PIN (min 4 digits)'},h('input',{type:'password',value:newPin1,onChange:e=>setNewPin1(e.target.value.replace(/\D/g,'')),className:'inp',placeholder:'New PIN',maxLength:8})),

    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:14}},

        view==='attendance'&&h(Attendance,{emps,att,setAtt:setAttLogged,curUser:user,showToast,hcodes,ot2Cats,selMonth,setSelMonth}),
        view==='ot'&&h(OTRegister,{emps,att,selMonth,setSelMonth,hcodes,ot2Cats}),
        view==='employees'&&h(Employees,{emps,setEmps,att,setAtt,curUser:user,showToast,depts,setDepts,contractors,hcodes,ot2Cats,selMonth}),
        view==='export'&&h(ExportView,{emps,att,selMonth,setSelMonth,hcodes,ot2Cats,contractors,curUser:user,showToast}),
        view==='settings'&&isSA&&h(Settings,{hcodes,setHcodes,ot2Cats,setOt2Cats,depts,setDepts,contractors,setContractors,emps,setEmps,sysUsers,setSysUsers,curUser:user,showToast}),
        view==='audit'&&h(AuditLog,{logs,setLogs,curUser:user})
      )
    ),
    toast&&h(Toast,{msg:toast.msg,type:toast.type})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
